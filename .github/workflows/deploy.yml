name: Deploy DevPulse Backend and Monitoring Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/devpulse-ec2-key
          chmod 600 ~/.ssh/devpulse-ec2-key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Create environment file
        run: |
          cat > .env.production <<'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

      - name: Prepare application directory on EC2
        run: |
          ssh -i ~/.ssh/devpulse-ec2-key "$EC2_USER@$EC2_HOST" <<'EOF'
            set -e

            APP_DIR="/opt/devpulse/app"
            REPO_URL="https://github.com/EbnulAhsan/Devpulse-devops-monitoring.git"

            mkdir -p /opt/devpulse

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
          EOF

      - name: Upload environment file to EC2
        run: |
          scp -i ~/.ssh/devpulse-ec2-key .env.production "$EC2_USER@$EC2_HOST:/opt/devpulse/app/.env"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/devpulse-ec2-key "$EC2_USER@$EC2_HOST" <<'EOF'
            set -e

            cd /opt/devpulse/app

            docker compose down --remove-orphans
            docker compose up -d --build

            docker compose ps
          EOF
